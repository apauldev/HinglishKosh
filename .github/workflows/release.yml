name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache raw data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: raw-data-${{ hashFiles('scripts/download_data.sh') }}

      - name: Download data
        run: |
          mkdir -p data/raw/wordnet data/raw/wiktionary data/raw/supplemental
          bash scripts/download_data.sh

      - name: Run pipeline
        run: python -m src.processing.pipeline

      - name: Generate checksums
        working-directory: data/output
        run: |
          sha256sum hinglish_dictionary_v1.json hinglish_dictionary_v1.min.json \
            hinglish_dictionary_v1_safe.json hinglish_dictionary_v1_safe.min.json \
            > SHA256SUMS.txt

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python -c "
          import json
          from pathlib import Path

          data = json.load(open('data/output/hinglish_dictionary_v1.json'))
          meta = data.get('meta', {})
          entries = meta.get('total_entries', 0)
          safe = meta.get('safe_entries', 0)
          sources = meta.get('source_counts', {})
          pos = meta.get('pos_distribution', {})

          # Get PR titles since last tag
          import subprocess
          tags = subprocess.run(['git', 'tag', '-l'], capture_output=True, text=True).stdout.strip().split('\n')
          tags = [t for t in tags if t and t != '${GITHUB_REF_NAME}']
          last_tag = tags[-1] if tags else ''
          log_range = f'{last_tag}..HEAD' if last_tag else 'HEAD'
          prs = subprocess.run(
              ['git', 'log', '--oneline', '--merges', log_range],
              capture_output=True, text=True
          ).stdout.strip()

          changes = []
          for line in prs.split('\n'):
              if 'Merge pull request' in line:
                  parts = line.split('#')
                  if len(parts) > 1:
                      pr_num = parts[1].split()[0]
                      changes.append(f'- #{pr_num}')

          pos_top = sorted(pos.items(), key=lambda x: -x[1])[:5]
          pos_str = ', '.join(f'{p} ({c:,})' for p, c in pos_top)

          notes = f'''## HinglishKosh v{VERSION}

### Dataset

| Metric | Value |
|--------|-------|
| Total entries | {entries:,} |
| Safe entries | {safe:,} |
| WordNet | {sources.get(\"WordNet\", 0):,} |
| Wiktionary | {sources.get(\"Wiktionary\", 0):,} |
| Top POS | {pos_str} |

### Files

| File | Size | Description |
|------|------|-------------|
| \`hinglish_dictionary_v1.json\` | 154 MB | Full dataset (pretty-printed) |
| \`hinglish_dictionary_v1.min.json\` | 123 MB | Full dataset (compact) |
| \`hinglish_dictionary_v1_safe.json\` | 154 MB | Safe dataset (toxic filtered) |
| \`hinglish_dictionary_v1_safe.min.json\` | 123 MB | Safe dataset (compact) |
| \`SHA256SUMS.txt\` | — | File checksums |

### Usage

```bash
# CLI
pip install hinglish-dictionary
hinglish-dict lookup namaste

# API
pip install hinglish-dictionary
uvicorn src.api.main:app --reload

# Python
import json
with open(\"hinglish_dictionary_v1.json\") as f:
    data = json.load(f)
```

### Changes
{chr(10).join(changes) if changes else \"- First release\"}

**Full Changelog**: https://github.com/apauldev/HinglishKosh/compare/{last_tag if last_tag else \"main\"}...{GITHUB_REF_NAME}'''

          Path('RELEASE_NOTES.md').write_text(notes)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            data/output/hinglish_dictionary_v1.json
            data/output/hinglish_dictionary_v1.min.json
            data/output/hinglish_dictionary_v1_safe.json
            data/output/hinglish_dictionary_v1_safe.min.json
            data/output/SHA256SUMS.txt
